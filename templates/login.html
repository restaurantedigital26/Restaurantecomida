<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            border: 1px solid #f5c6cb;
            text-align: center;
        }
        .info-text {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-top: 15px;
        }
        .login-hint {
            background-color: #e8f5e8;
            border: 1px solid #4CAF50;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 20px;
            color: #2e7d32;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <h1>Iniciar Sesión</h1>

    {% if error %}
    <div class="error-message">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
    {% endif %}

    <div class="login-hint">
        <i class="fas fa-info-circle"></i>
        El sistema detectará automáticamente tu tipo de cuenta
    </div>

    <form method="POST">
        <div class="input-group">
            <input type="text" name="email" placeholder="Email o usuario" required>
        </div>

        <div class="input-group" style="margin-top:10px;">
            <input type="password" name="password" placeholder="Contraseña" required>
        </div>

        <button type="submit" style="margin-top:15px; width:100%;">
            <i class="fas fa-sign-in-alt"></i> Ingresar
        </button>
    </form>

    <div class="footer">
        ¿Eres cliente? <a href="/register">Regístrate aquí</a>
    </div>
    
    <div class="info-text">
        <small>Los restaurantes son dados de alta por el administrador</small>
    </div>
</div>

</body>
</html>
