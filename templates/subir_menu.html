<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Subir Menú</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        .vista-previa-imagen {
            margin-top: 10px;
            max-width: 200px;
            max-height: 150px;
            border-radius: 5px;
            border: 1px solid #ddd;
            padding: 5px;
        }
        .info-cloudinary {
            background-color: #e8f5e9;
            border-left: 4px solid #4CAF50;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            color: #2e7d32;
        }
    </style>
</head>

<body class="restaurantes-page">

<div class="detalle-restaurante">

    <h1>📋 Registrar Platillo</h1>

    <form method="POST" enctype="multipart/form-data">

        <!-- DATOS DEL PLATILLO -->
        <div class="form-group">
            <label>Nombre del platillo</label>
            <input type="text" name="nombre_platillo" required>
        </div>

        <div class="form-group">
            <label>Precio</label>
            <input type="number" step="0.01" name="precio" required>
        </div>

        <div class="form-group">
            <label>Descripción del platillo</label>
            <textarea name="descripcion_platillo" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label>Foto del platillo</label>
            <input type="file" name="foto" accept="image/*" id="foto-input" onchange="vistaPrevia(this)">
            <div id="preview-container"></div>
            <div class="info-cloudinary">
                <i class="fas fa-cloud-upload-alt"></i> La imagen se subirá automáticamente a Cloudinary
            </div>
        </div>

        <hr style="margin:30px 0;">

        <!-- DATOS GENERALES DEL LOCAL -->
        <h2> Información del Restaurante</h2>

        <div class="form-group">
            <label>Descripción general del local</label>
            <textarea name="descripcion_local" rows="4"></textarea>
        </div>

        <div class="form-group">
            <label>Ubicación (Dirección completa)</label>
            <input type="text" name="ubicacion">
        </div>

        <div class="form-group">
            <label>Teléfono</label>
            <input type="text" name="telefono">
        </div>

        <div class="form-group">
            <label>URL de redes sociales</label>
            <input type="url" name="redes_sociales" placeholder="https://facebook.com/...">
        </div>

        <div class="boton-container">
            <button type="submit" class="btn-volver">
                Guardar Información
            </button>
        </div>

    </form>

</div>

<script>
    function vistaPrevia(input) {
        const container = document.getElementById('preview-container');
        container.innerHTML = '';
        
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const img = document.createElement('img');
                img.src = e.target.result;
                img.className = 'vista-previa-imagen';
                img.alt = 'Vista previa';
                container.appendChild(img);
            }
            
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

</body>
</html>
